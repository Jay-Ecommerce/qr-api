name: Dev.to weekly article

on:
  schedule:
    - cron: "24 9 * * 4" # Thursdays 09:24 UTC (validate-api posts Tue, currency-api posts Sat — staggered so the same Dev.to account doesn't post multiple times in one day; offset off :00 since round-minute GH Actions schedules see heavy global contention and can be delayed or dropped)
  workflow_dispatch:
    inputs:
      article_index:
        description: "Optional: index into DEVTO_ARTICLES to post a specific article instead of the weekly rotation pick"
        required: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/marketing/devto-post.mjs
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          ARTICLE_INDEX: ${{ github.event.inputs.article_index }}
